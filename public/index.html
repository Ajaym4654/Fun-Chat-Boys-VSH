<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>VSH Fun Chat | Anonymous</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app">
    <header>
      <div class="brand">
        <div class="title">💬 VSH Chat</div>
        <div class="status">
          <span class="live-dot"></span>
          <span>Live Session</span>
        </div>
      </div>
      <div class="header-actions">
        <button id="muteBtn" class="icon-btn" title="Toggle Sound">🔊</button>
        <div class="meta-info">No History · Encrypted</div>
      </div>
    </header>

    <main id="chatArea">
      <div class="system-msg">Welcome! Be kind. Messages vanish on refresh.</div>
    </main>

    <div id="typingIndicator" class="typing-pill">Someone is typing...</div>

    <form id="controls" autocomplete="off">
      <div class="input-group">
        <input id="userName" type="text" placeholder="Your Name" maxlength="15" />
        <div class="main-input">
          <textarea id="msgInput" rows="1" placeholder="Type a message..."></textarea>
          <div class="actions">
            <button type="button" id="emojiBtn" class="icon-btn">😊</button>
            <label class="file-label">
              <input type="file" id="fileInput" hidden />
              📎
            </label>
          </div>
        </div>
        <button type="submit" id="sendBtn" class="send-btn">
          <span>Send</span>
          <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
        </button>
      </div>
    </form>

    <footer>
      <small>VSH Fun Chat &copy; 2026 · Purely Ephemeral</small>
    </footer>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="client.js"></script>
</body>
</html>
